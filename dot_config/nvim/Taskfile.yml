version: '3'

vars:
  IMAGE_NAME: '{{.DOCKERHUB_USER}}/nvim-config'
  TAG: 'latest'

tasks:
  build:
    desc: Docker imageをビルド
    cmds:
      - docker build -t {{.IMAGE_NAME}}:{{.TAG}} .
    sources:
      - Dockerfile
      - '**/*.lua'

  run:
    desc: カレントディレクトリでNeovimを起動
    cmds:
      - >-
        docker run -it --rm
        -v "$(pwd)":/workspace
        -v "$HOME/.gitconfig":/root/.gitconfig:ro
        -v "$HOME/.ssh":/root/.ssh:ro
        {{.IMAGE_NAME}}:{{.TAG}} {{.CLI_ARGS}}

  push:
    desc: Docker Hubにpush
    cmds:
      - docker push {{.IMAGE_NAME}}:{{.TAG}}

  buildx:
    desc: マルチプラットフォームビルド+push (amd64/arm64)
    cmds:
      - >-
        docker buildx build
        --platform linux/amd64,linux/arm64
        -t {{.IMAGE_NAME}}:{{.TAG}}
        --push .

  shell:
    desc: コンテナ内でbashを起動 (デバッグ用)
    cmds:
      - >-
        docker run -it --rm --entrypoint bash
        -v "$(pwd)":/workspace
        -v "$HOME/.gitconfig":/root/.gitconfig:ro
        -v "$HOME/.ssh":/root/.ssh:ro
        {{.IMAGE_NAME}}:{{.TAG}}

  test:setup:
    desc: テスト依存をインストール (初回のみ)
    cmds:
      - |
        # mise: 非対話シェルでは shims が PATH に無いので mise exec で同じ Lua に luarocks を当てる
        if command -v mise >/dev/null 2>&1 && mise exec -- lua -v 2>/dev/null | grep -q 'Lua 5.1'; then
          mise exec -- sh -c 'luarocks --local --lua-version 5.1 install busted && luarocks --local --lua-version 5.1 install nlua'
        elif command -v lua5.1 >/dev/null 2>&1 || { command -v lua >/dev/null 2>&1 && lua -v 2>&1 | grep -q 'Lua 5.1'; }; then
          luarocks --local --lua-version 5.1 install busted
          luarocks --local --lua-version 5.1 install nlua
        elif command -v nix-shell >/dev/null 2>&1; then
          nix-shell -p lua51Packages.lua lua51Packages.luarocks --run \
            'luarocks --local --lua-version 5.1 install busted && luarocks --local --lua-version 5.1 install nlua'
        else
          echo "Lua 5.1 が見つかりません。~/.config/mise/config.toml に lua を追加して mise install、または nix-shell。"
          exit 1
        fi

  test:
    desc: 全テスト実行
    cmds:
      - |
        if command -v mise >/dev/null 2>&1 && mise exec -- lua -v 2>/dev/null | grep -q 'Lua 5.1'; then
          mise exec -- sh -c 'eval $(luarocks --lua-version 5.1 path) && busted --lua nlua --helper tests/minimal_init.lua tests/'
        elif command -v lua5.1 >/dev/null 2>&1 || { command -v lua >/dev/null 2>&1 && lua -v 2>&1 | grep -q 'Lua 5.1'; }; then
          eval $(luarocks --lua-version 5.1 path) && busted --lua nlua --helper tests/minimal_init.lua tests/
        elif command -v nix-shell >/dev/null 2>&1; then
          nix-shell -p lua51Packages.lua lua51Packages.luarocks --run \
            'eval $(luarocks --lua-version 5.1 path) && busted --lua nlua --helper tests/minimal_init.lua tests/'
        else
          echo "Lua 5.1 / luarocks / busted が見つかりません (mise: config.toml に lua を追加し test:setup を実行)"
          exit 1
        fi

  test:static:
    desc: 静的テストのみ (パーサー不要)
    cmds:
      - |
        if command -v mise >/dev/null 2>&1 && mise exec -- lua -v 2>/dev/null | grep -q 'Lua 5.1'; then
          mise exec -- sh -c 'eval $(luarocks --lua-version 5.1 path) && busted --lua nlua tests/lsp_config_spec.lua tests/consistency_spec.lua'
        elif command -v lua5.1 >/dev/null 2>&1 || { command -v lua >/dev/null 2>&1 && lua -v 2>&1 | grep -q 'Lua 5.1'; }; then
          eval $(luarocks --lua-version 5.1 path) && busted --lua nlua tests/lsp_config_spec.lua tests/consistency_spec.lua
        elif command -v nix-shell >/dev/null 2>&1; then
          nix-shell -p lua51Packages.lua lua51Packages.luarocks --run \
            'eval $(luarocks --lua-version 5.1 path) && busted --lua nlua tests/lsp_config_spec.lua tests/consistency_spec.lua'
        else
          echo "Lua 5.1 / luarocks / busted が見つかりません (mise: config.toml に lua を追加し test:setup を実行)"
          exit 1
        fi

  test:docker:
    deps: [build]
    desc: Docker イメージ内でテスト実行
    cmds:
      - >-
        docker run --rm --entrypoint nvim {{.IMAGE_NAME}}:{{.TAG}}
        --headless +"luafile /root/.config/nvim/tests/test_docker_smoke.lua"

  version:
    desc: コンテナ内のNeovimバージョン確認
    cmds:
      - docker run --rm {{.IMAGE_NAME}}:{{.TAG}} --version
